<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta
            name="viewport"
            content="width=device-width, user-scalable=no, initial-scale=1.0, maximum-scale=1.0, minimum-scale=1.0"
    />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.lineicons.com/5.1/line/lineicons.css" />
    <link rel="stylesheet" href="styles/style.css" />
    <title>Tech Wave</title>
</head>
<body>
<header>
    <nav class="bg-[var(--color-navbar)] border-b border-[rgba(65,37,103,1)]">
        <div class="navbar-content max-w-[576px] lg:max-w-[1240px] m-auto py-6 lg:px-[20px] items-center flex justify-between ">
            <div class="logo-container ">
                <a class="no-underline" href="">
                    <img class="lg:hidden" src="assets/TechWave(small-device).png" alt="" />
                    <img class="lg:block hidden" src="assets/TechWave.png" alt="" />
                </a>
            </div>
            <img class="lg:hidden" src="assets/hamburger-menu.png" alt="">
            <div class="menu hidden lg:block">
                <ul class="menu-container items-center flex justify-between gap-[30px] text-white ">
                    <li class="menu-item"><a class="menu-item-link no-underline text-base font-medium" href="">About</a></li>
                    <li class="menu-item"><a class="menu-item-link no-underline text-base font-medium" href="">Episodes</a></li>
                    <li class="menu-item"><a class="menu-item-link no-underline text-base font-medium" href="">Host</a></li>
                </ul>
            </div>
            <button class="btn-primary hidden lg:block text-white px-4 py-3 bg-gradient-to-tr from-[rgba(247,233,63,1)] via-[rgba(251,9,180,1)] to-[rgba(145,0,248,1)] rounded-full text-base font-semibold  transition duration-100 ease-out active:translate-y-0.5 hover:scale-103 cursor-pointer">Subscribe <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </nav>
    <section class="banner bg-[var(--color-navbar)]">
        <div class="banner-circle bg-[url('assets/hero-bg.png')] bg-cover bg-center lg:bg-cover lg:bg-center bg-no-repeat max-w-[576px] lg:max-w-[1600px] m-auto  lg:py-[100px] relative">
            <div class=" pb-[24px] relative top-[60px] lg:top-[0px]">
                <div class="banner-image-container flex justify-center items-center relative pb-[24px]  lg:pb-[40px]">
                    <div class="flex justify-center items-center relative">
                        <img class="w-[200px] lg:w-[350px] h-auto" src="assets/hero-circle.png" alt="">
                        <img class="absolute w-[50px h-[70px] lg:w-[117] lg:h-auto" src="assets/microphone.png" alt="">
                        <p class="inline-block px-[16px] py-[8px] bg-[#00FF88] rounded-3xl shadow-[0px_03px_27px_0px_rgba(0,255,136,0.5)] absolute top-[-2px] right-[5px] lg:top-[8px] lg:right-[40px] text-base font-semibold text-[#1A0B2E]">NEW</p>
                    </div>
                </div>
                <div class=" lg:block">
                    <div class="banner-text max-w-[400px] lg:max-w-none m-auto text-center">
                        <h3 class="banner-title text-white  font-extrabold text-[40px]">
                            TechWave
                        </h3>
                        <p class="banner-description text-[var(--text-color-primary)] text-base font-normal pb-[24px]">Your daily dose of tech insights, productivity hacks, and personal growth</p>
                    </div>
                    <div class="button flex justify-center gap-[8px] pb-[40px] lg:pb-0">
                        <button class="btn-primary text-white flex justify-center items-center gap-[8px] px-[20px] py-[12px] bg-linear-to-tr from-[#F7E93F] via-[#FB09B4] to-[#9100F8] rounded-full transition duration-100 ease-out active:translate-y-0.5 hover:scale-103 cursor-pointer"><i class="lni lni-spotify-alt"></i> Listen on Spotify</button>
                        <button class="btn-green text-[#00FF88] flex items-center px-[20px] py-[12px] border-[2px] rounded-full gap-[10px] transition duration-100 ease-out active:translate-y-0.5 hover:scale-103 cursor-pointer"><img class="w-[18px] h-auto" src="assets/message.png" alt="">Subscribe</button>
                    </div>
                </div>
            </div>
        </div>
    </section>
</header>

</body>
</html>
